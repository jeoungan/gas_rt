<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Maze</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #0f172a;
    --text-color: #f8fafc;
    --neon-blue: #38bdf8;
    --neon-pink: #ec4899;
    --neon-green: #4ade80;
    --neon-yellow: #facc15;
    --wall-color: #1e293b;
    --path-color: #0f172a;
    --player-color: var(--neon-blue);
    --goal-color: var(--neon-pink);
    --btn-bg: rgba(255, 255, 255, 0.05);
    --btn-hover: rgba(255, 255, 255, 0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none; /* Prevent scrolling on mobile */
}

.app-container {
    width: 100%;
    max-width: 600px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: radial-gradient(circle at top, #1e293b 0%, var(--bg-color) 100%);
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 2px solid rgba(255,255,255,0.1);
    padding-bottom: 15px;
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
}

.stats {
    display: flex;
    gap: 15px;
    font-weight: 500;
    font-size: 1.1rem;
}

.timer, .level {
    background: rgba(255, 255, 255, 0.05);
    padding: 5px 10px;
    border-radius: 8px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.game-area {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--path-color);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255,255,255,0.05);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: auto;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(5px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
    transition: opacity 0.3s ease;
}

.overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

#overlayTitle {
    font-size: 2.5rem;
    margin-bottom: 10px;
    color: var(--neon-yellow);
    text-shadow: 0 0 15px rgba(250, 204, 21, 0.5);
}

#overlayMessage {
    font-size: 1.1rem;
    margin-bottom: 30px;
    opacity: 0.8;
}

.controls-setup {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--text-color);
    transition: all 0.2s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

.btn:hover {
    transform: translateY(-2px);
    background: var(--btn-hover);
}

.btn:active {
    transform: translateY(0);
}

.btn-primary {
    border-color: var(--neon-blue);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
}
.btn-primary:hover {
    background: var(--neon-blue);
    color: #fff;
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
}

.btn-warning {
    border-color: var(--neon-yellow);
    box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
}
.btn-warning:hover {
    background: var(--neon-yellow);
    color: #000;
    box-shadow: 0 0 20px rgba(250, 204, 21, 0.6);
}

.btn-danger {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px rgba(236, 72, 153, 0.2);
}
.btn-danger:hover {
    background: var(--neon-pink);
    color: #fff;
    box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
}

.mobile-controls {
    margin-top: auto;
    display: none;
    justify-content: center;
    padding: 20px 0;
}

@media (max-width: 600px) {
    .mobile-controls {
        display: flex; /* only show on small screens */
    }
    .app-container {
        padding: 15px;
    }
}

.dpad {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}

.dpad-row {
    display: flex;
    gap: 50px;
}

.dpad-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255,255,255,0.7);
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 5px 15px rgba(0,0,0,0.5);
    transition: all 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

.dpad-btn:active, .dpad-btn.active {
    background: rgba(56, 189, 248, 0.3);
    color: var(--neon-blue);
    transform: scale(0.95);
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 15px rgba(56, 189, 248, 0.4);
}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>NEON MAZE</h1>
            <div class="stats">
                <div class="timer">Time: <span id="timeDisplay">0</span>s</div>
                <div class="level">Level: <span id="levelDisplay">Ready</span></div>
            </div>
        </header>

        <div class="game-area">
            <canvas id="mazeCanvas"></canvas>
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">Are you ready?</h2>
                <p id="overlayMessage">Find your way to the exit.</p>
                <div class="controls-setup">
                    <button class="btn btn-primary" onclick="startGame('easy')">Easy</button>
                    <button class="btn btn-warning" onclick="startGame('medium')">Medium</button>
                    <button class="btn btn-danger" onclick="startGame('hard')">Hard</button>
                </div>
            </div>
        </div>

        <div class="mobile-controls" id="mobileControls">
            <div class="dpad">
                <button class="dpad-btn up" id="btnUp">▲</button>
                <div class="dpad-row">
                    <button class="dpad-btn left" id="btnLeft">◀</button>
                    <button class="dpad-btn right" id="btnRight">▶</button>
                </div>
                <button class="dpad-btn down" id="btnDown">▼</button>
            </div>
        </div>
    </div>

    <script>
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayMessage = document.getElementById('overlayMessage');
const timeDisplay = document.getElementById('timeDisplay');
const levelDisplay = document.getElementById('levelDisplay');

let cols, rows;
let w; // cell width
let grid = [];
let current;
let stack = [];
let player = { x: 0, y: 0 };
let goal = { x: 0, y: 0 };
let isPlaying = false;
let startTime;
let timerInterval;
let animationFrame;
let currentLevel = 'easy';

// Game configs
const levels = {
    easy: { cols: 10, rows: 10 },
    medium: { cols: 15, rows: 15 },
    hard: { cols: 25, rows: 25 }
};

class Cell {
    constructor(i, j) {
        this.i = i;
        this.j = j;
        this.walls = [true, true, true, true]; // top, right, bottom, left
        this.visited = false;
    }

    checkNeighbors() {
        let neighbors = [];
        let top = grid[index(this.i, this.j - 1)];
        let right = grid[index(this.i + 1, this.j)];
        let bottom = grid[index(this.i, this.j + 1)];
        let left = grid[index(this.i - 1, this.j)];

        if (top && !top.visited) neighbors.push(top);
        if (right && !right.visited) neighbors.push(right);
        if (bottom && !bottom.visited) neighbors.push(bottom);
        if (left && !left.visited) neighbors.push(left);

        if (neighbors.length > 0) {
            let r = Math.floor(Math.random() * neighbors.length);
            return neighbors[r];
        } else {
            return undefined;
        }
    }

    draw() {
        let x = this.i * w;
        let y = this.j * w;
        
        ctx.strokeStyle = '#1e293b'; 
        ctx.lineWidth = Math.max(2, w * 0.1);
        ctx.lineCap = 'round';

        if (this.walls[0]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke(); }
        if (this.walls[1]) { ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + w); ctx.stroke(); }
        if (this.walls[2]) { ctx.beginPath(); ctx.moveTo(x + w, y + w); ctx.lineTo(x, y + w); ctx.stroke(); }
        if (this.walls[3]) { ctx.beginPath(); ctx.moveTo(x, y + w); ctx.lineTo(x, y); ctx.stroke(); }
    }
}

function index(i, j) {
    if (i < 0 || j < 0 || i > cols - 1 || j > rows - 1) {
        return -1;
    }
    return i + j * cols;
}

function removeWalls(a, b) {
    let x = a.i - b.i;
    if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
    else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
    
    let y = a.j - b.j;
    if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
    else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
}

function generateMaze() {
    grid = [];
    stack = [];
    for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
            let cell = new Cell(i, j);
            grid.push(cell);
        }
    }
    
    current = grid[0];
    current.visited = true;

    // Iterative DFS for maze generation
    while (true) {
        let next = current.checkNeighbors();
        if (next) {
            next.visited = true;
            stack.push(current);
            removeWalls(current, next);
            current = next;
        } else if (stack.length > 0) {
            current = stack.pop();
        } else {
            break; 
        }
    }
}

function initGame(level) {
    currentLevel = level;
    cols = levels[level].cols;
    rows = levels[level].rows;
    levelDisplay.textContent = level.charAt(0).toUpperCase() + level.slice(1);
    
    // Setup canvas resolution to be sharp
    const parentContainer = document.querySelector('.game-area');
    const size = Math.min(parentContainer.clientWidth, 600);
    
    canvas.width = size * 2; // For high DPI (retina displays)
    canvas.height = size * 2;
    w = canvas.width / cols;
    
    generateMaze();
    
    player.x = 0;
    player.y = 0;
    goal.x = cols - 1;
    goal.y = rows - 1;
    
    startTime = Date.now();
    clearInterval(timerInterval);
    timeDisplay.textContent = "0";
    timerInterval = setInterval(() => {
        let seconds = Math.floor((Date.now() - startTime) / 1000);
        timeDisplay.textContent = seconds;
    }, 1000);

    isPlaying = true;
    overlay.classList.add('hidden');
    
    cancelAnimationFrame(animationFrame);
    drawGame();
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw cells
    for (let i = 0; i < grid.length; i++) {
        grid[i].draw();
    }
    
    // Draw Goal
    let gx = goal.x * w + w / 2;
    let gy = goal.y * w + w / 2;
    let pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    
    ctx.beginPath();
    ctx.arc(gx, gy, w * 0.3 + w * 0.1 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = '#ec4899';
    ctx.shadowBlur = 20 * pulse + 10;
    ctx.shadowColor = '#ec4899';
    ctx.fill();
    ctx.shadowBlur = 0;

    // Draw Player
    let px = player.x * w + w / 2;
    let py = player.y * w + w / 2;
    
    ctx.beginPath();
    ctx.arc(px, py, w * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#38bdf8';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#38bdf8';
    ctx.fill();
    ctx.shadowBlur = 0;

    if (isPlaying) {
        animationFrame = requestAnimationFrame(drawGame);
    }
}

function movePlayer(dx, dy) {
    if (!isPlaying) return;
    
    let cell = grid[index(player.x, player.y)];
    
    if (dy === -1 && !cell.walls[0]) player.y--; // Up
    else if (dx === 1 && !cell.walls[1]) player.x++; // Right
    else if (dy === 1 && !cell.walls[2]) player.y++; // Down
    else if (dx === -1 && !cell.walls[3]) player.x--; // Left
    
    checkWin();
}

function checkWin() {
    if (player.x === goal.x && player.y === goal.y) {
        isPlaying = false;
        clearInterval(timerInterval);
        
        let seconds = Math.floor((Date.now() - startTime) / 1000);
        
        // GAS Save Data call
        if (typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(function() {
                    console.log("Data saved successfully.");
                })
                .saveData(currentLevel, seconds);
        }
        
        setTimeout(() => {
            overlayTitle.textContent = "Level Cleared!";
            overlayTitle.style.color = "#4ade80";
            overlayMessage.textContent = `You finished in ${seconds} seconds! (저장 시도중...)`;
            
            // Adjust buttons for replay
            overlay.classList.remove('hidden');
        }, 300);
    }
}

window.addEventListener('keydown', (e) => {
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
    
    if (e.key === 'ArrowUp') movePlayer(0, -1);
    else if (e.key === 'ArrowRight') movePlayer(1, 0);
    else if (e.key === 'ArrowDown') movePlayer(0, 1);
    else if (e.key === 'ArrowLeft') movePlayer(-1, 0);
});

// Mobile Controls Setup
const btnUp = document.getElementById('btnUp');
const btnRight = document.getElementById('btnRight');
const btnDown = document.getElementById('btnDown');
const btnLeft = document.getElementById('btnLeft');

function setupMobileButton(btn, dx, dy) {
    let interval;
    let initialDelayTimeout;

    const startMove = (e) => {
        e.preventDefault();
        btn.classList.add('active');
        movePlayer(dx, dy);
        
        // Add hold-to-move effect
        initialDelayTimeout = setTimeout(() => {
            interval = setInterval(() => movePlayer(dx, dy), 120);
        }, 300); // 300ms delay before repeating
    };
    const endMove = (e) => {
        if (e) e.preventDefault();
        btn.classList.remove('active');
        clearTimeout(initialDelayTimeout);
        clearInterval(interval);
    };
    
    btn.addEventListener('touchstart', startMove, {passive: false});
    btn.addEventListener('touchend', endMove);
    btn.addEventListener('mousedown', startMove);
    btn.addEventListener('mouseup', endMove);
    btn.addEventListener('mouseleave', endMove);
}

setupMobileButton(btnUp, 0, -1);
setupMobileButton(btnRight, 1, 0);
setupMobileButton(btnDown, 0, 1);
setupMobileButton(btnLeft, -1, 0);

function startGame(level) {
    initGame(level);
}

// Ensure the game resizes correctly if window is resized
window.addEventListener('resize', () => {
    if (isPlaying) {
        // Handled robustly enough by CSS ratio unless extreme changes
    }
});
    </script>
</body>
</html>
